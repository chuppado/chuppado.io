name: 🧺 Laundry Reminder

on:
  schedule:
    # -------------------------------------------------------
    # CUSTOMIZE YOUR SCHEDULE BELOW
    # Format: cron( minute  hour  day-of-month  month  day-of-week )
    # Times are in UTC — convert from your local timezone!
    # UTC+7 (Bangkok/Jakarta): subtract 7 hrs  → 8 AM local = "0 1 * * *"
    # UTC+8 (Taipei/KL/SG):    subtract 8 hrs  → 8 AM local = "0 0 * * *"
    # UTC+9 (Tokyo/Seoul):     subtract 9 hrs  → 8 AM local = "0 23 * * 0" (prev day)
    #
    # EXAMPLES (feel free to add/remove/edit):
    # -------------------------------------------------------

    # 🗓 Monday + Thursday at 8:00 AM (UTC+7)
    - cron: "0 1 * * 1"   # Monday
    - cron: "50 14 * * 2"   # Thursday

    # 🗓 Saturday at 10:00 AM (UTC+7)
    - cron: "0 3 * * 6"

    # 🗓 Add more lines here as needed!
    # - cron: "0 1 * * 3"  # Wednesday 8 AM UTC+7
    # -------------------------------------------------------

  workflow_dispatch:    # ← also lets you trigger it manually from GitHub

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 🧺 Send Laundry Reminder via LINE
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os
          from datetime import datetime

          token   = os.environ["LINE_CHANNEL_ACCESS_TOKEN"]
          user_id = os.environ["LINE_USER_ID"]

          # Get current day name
          day = datetime.now(timezone.utc).strftime("%A")

          message = (
              f"🧺 Schedule Reminder!\n"
              f"Time to do your Schedule ({day})!\n\n"
              f"✅ https://chuppado.github.io/\n"
          )

          payload = {
              "to": user_id,
              "messages": [{"type": "text", "text": message}]
          }

          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {token}"
              },
              method="POST"
          )

          with urllib.request.urlopen(req) as res:
              print(f"✅ Message sent! Status: {res.status}")
          EOF
